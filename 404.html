<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 · 信号丢失</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #08080f;
  color: #e8e6f0;
  font-family: "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; text-align: center; padding: 2rem;
  background: radial-gradient(ellipse at 50% 50%, rgba(74,143,204,0.06) 0%, transparent 60%);
}
h1 { font-size: 4rem; font-weight: 300; letter-spacing: 0.2em; color: #3a3850; margin-bottom: 1rem; }
p { color: #6b6880; line-height: 2; font-size: 0.95rem; letter-spacing: 0.04em; }
a { color: #3da5a0; text-decoration: none; transition: color 0.3s; }
a:hover { color: #c9a84c; }
.stars { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div style="position:relative;z-index:1;">
  <h1>404</h1>
  <p>这个坐标上没有星体。</p>
  <p style="margin-top:1rem; font-size:0.8rem; color:#3a3850;">
    也许它曾经存在过，也许它还没形成。<br>
    <a href="/">← 回到数字海洋</a>
  </p>
</div>
<script>
(function(){var s=document.getElementById('stars'),c=[];for(var i=0;i<300;i++){c.push(Math.floor(Math.random()*2000)+'px '+Math.floor(Math.random()*2000)+'px rgba(232,230,240,'+(0.2+Math.random()*0.3)+')');}s.style.boxShadow=c.join(',');s.style.width='1px';s.style.height='1px';s.style.borderRadius='50%';})();
</script>
</body>
</html>
