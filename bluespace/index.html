<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蓝色空间 · 时序薯盘</title>
<meta name="description" content="以星图式界面呈现连续市场状态">
<link rel="stylesheet" href="../assets/css/shared.css">
<style>
  :root {
    --blue-space-bg: #060d18;
    --panel-bg: rgba(10, 20, 40, 0.7);
    --border-subtle: rgba(74, 143, 204, 0.12);
    --text-primary: #c8d8f0;
    --text-secondary: #6a88a8;
    --accent-buy: #3da5a0;
    --accent-sell: #b84a6c;
    --accent-warn: #c9a84c;
  }

  body {
    background: var(--blue-space-bg);
    font-family: "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
  }

  .atlas-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1rem;
    position: relative;
    z-index: 1;
  }

  .atlas-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0 1rem;
    border-bottom: 1px solid var(--border-subtle);
    margin-bottom: 1rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .atlas-header .brand {
    font-size: 1.1rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--text-primary);
  }

  .atlas-header .brand span {
    color: var(--accent-buy);
  }

  .atlas-header .market-status {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: monospace;
    font-size: 0.75rem;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent-buy);
    animation: statusPulse 2s ease-in-out infinite;
  }

  @keyframes statusPulse {
    0%, 100% { box-shadow: 0 0 4px var(--accent-buy); }
    50% { box-shadow: 0 0 12px var(--accent-buy); }
  }

  .top-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 0.6rem;
    margin-bottom: 1rem;
  }

  .stat-card {
    background: var(--panel-bg);
    border: 1px solid var(--border-subtle);
    padding: 0.8rem 1rem;
  }

  .stat-card .stat-label {
    font-size: 0.65rem;
    color: var(--text-secondary);
    letter-spacing: 0.06em;
    margin-bottom: 0.3rem;
    text-transform: uppercase;
  }

  .stat-card .stat-value {
    font-size: 1.3rem;
    font-weight: 300;
    color: var(--text-primary);
    font-family: monospace;
  }

  .stat-card .stat-value.up { color: var(--accent-buy); }
  .stat-card .stat-value.down { color: var(--accent-sell); }

  .main-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 0.6rem;
    margin-bottom: 0.6rem;
  }

  @media (max-width: 900px) {
    .main-grid {
      grid-template-columns: 1fr;
    }
  }

  .chart-panel {
    background: var(--panel-bg);
    border: 1px solid var(--border-subtle);
    padding: 1rem;
  }

  .chart-panel h3 {
    font-size: 0.75rem;
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
    margin-bottom: 0.8rem;
  }

  .chart-area {
    position: relative;
    width: 100%;
    height: 280px;
  }

  .chart-area canvas {
    width: 100%;
    height: 100%;
  }

  .order-book {
    background: var(--panel-bg);
    border: 1px solid var(--border-subtle);
    padding: 1rem;
  }

  .order-book h3 {
    font-size: 0.75rem;
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
    margin-bottom: 0.8rem;
  }

  .ob-row {
    display: grid;
    grid-template-columns: 1fr 80px 1fr;
    gap: 0.3rem;
    font-family: monospace;
    font-size: 0.8rem;
    padding: 0.25rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.02);
  }

  .ob-row .ob-price {
    text-align: center;
  }

  .ob-row .ob-price.sell { color: var(--accent-sell); }
  .ob-row .ob-price.buy { color: var(--accent-buy); }

  .ob-row .ob-vol {
    color: var(--text-secondary);
    position: relative;
  }

  .ob-row .ob-vol.buy { text-align: right; }
  .ob-row .ob-vol .bar {
    position: absolute;
    top: 0;
    bottom: 0;
    opacity: 0.15;
  }

  .ob-row .ob-vol.buy .bar {
    right: 0;
    background: var(--accent-buy);
  }

  .ob-row .ob-vol.sell .bar {
    left: 0;
    background: var(--accent-sell);
  }

  .ob-spread {
    text-align: center;
    padding: 0.4rem;
    font-family: monospace;
    font-size: 0.75rem;
    color: var(--accent-warn);
    border-top: 1px solid rgba(255,255,255,0.03);
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }

  .bottom-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 0.6rem;
    margin-bottom: 0.6rem;
  }

  .hour-strip {
    background: var(--panel-bg);
    border: 1px solid var(--border-subtle);
    padding: 1rem;
    overflow-x: auto;
  }

  .hour-strip h3 {
    font-size: 0.75rem;
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
    margin-bottom: 0.8rem;
  }

  .hours-grid {
    display: grid;
    grid-template-columns: repeat(24, 1fr);
    gap: 2px;
    min-width: 600px;
  }

  .hour-cell {
    padding: 0.5rem 0.2rem;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.03);
    cursor: pointer;
    transition: all 0.2s;
    font-family: monospace;
    font-size: 0.65rem;
  }

  .hour-cell:hover {
    background: rgba(74,143,204,0.15);
  }

  .hour-cell.active {
    border-color: var(--accent-buy);
    background: rgba(61,165,160,0.1);
  }

  .hour-cell .h-label {
    color: var(--text-secondary);
  }

  .hour-cell .h-indicator {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    margin: 0.15rem auto 0;
  }

  .hour-cell .h-indicator.hot { background: var(--accent-sell); }
  .hour-cell .h-indicator.warm { background: var(--accent-warn); }
  .hour-cell .h-indicator.cold { background: var(--accent-buy); }

  .ops-panel {
    background: var(--panel-bg);
    border: 1px solid var(--border-subtle);
    padding: 1rem;
  }

  .ops-panel h3 {
    font-size: 0.75rem;
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
    margin-bottom: 0.8rem;
  }

  .ops-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.8rem;
  }

  .ops-btn {
    flex: 1;
    padding: 0.6rem 1rem;
    background: transparent;
    border: 1px solid var(--border-subtle);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 0.04em;
  }

  .ops-btn.buy-btn:hover {
    border-color: var(--accent-buy);
    background: rgba(61,165,160,0.1);
    color: var(--accent-buy);
  }

  .ops-btn.sell-btn:hover {
    border-color: var(--accent-sell);
    background: rgba(184,74,108,0.1);
    color: var(--accent-sell);
  }

  .ops-stats {
    font-family: monospace;
    font-size: 0.7rem;
    color: var(--text-secondary);
    line-height: 2;
  }

  .back-link {
    text-align: center;
    padding: 1.5rem;
    position: relative;
    z-index: 1;
    font-family: monospace;
    font-size: 0.8rem;
  }

  .back-link a {
    color: var(--star-faint);
    letter-spacing: 0.1em;
    transition: color 0.3s;
  }

  .back-link a:hover { color: var(--accent-gold); }
</style>
</head>
<body>

<div class="atlas-container">
  <div class="atlas-header">
    <div class="brand">蓝色空间<span> · 时序薯盘</span></div>
    <div class="market-status">
      <span class="status-dot"></span>
      <span style="color:var(--text-secondary)">Signal Online</span>
    </div>
  </div>

  <div class="top-stats">
    <div class="stat-card">
      <div class="stat-label">最新价 薯元/袋</div>
      <div class="stat-value" id="lastPrice">468.49</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">总搓成</div>
      <div class="stat-value up" id="totalDone">1181</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">存薯</div>
      <div class="stat-value down" id="inventory">-12</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">活跃时段</div>
      <div class="stat-value" id="activeHours" style="color:var(--text-primary)">11/24</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">盯梢器</div>
      <div class="stat-value" style="color:var(--accent-buy)">13/24 ON</div>
    </div>
  </div>

  <div class="main-grid">
    <div class="chart-panel">
      <h3>24h 主薯图</h3>
      <div class="chart-area">
        <canvas id="priceChart"></canvas>
      </div>
    </div>

    <div class="order-book">
      <h3>薯盘 收1-6 / 放1-6</h3>
      <div id="orderBook"></div>
      <div class="ob-spread" id="obSpread">价差 3.73</div>
      <div style="margin-top:0.8rem;font-family:monospace;font-size:0.7rem;color:var(--text-secondary);line-height:1.8;">
        <div>收一 <span style="color:var(--accent-buy)" id="bid1">466.63</span></div>
        <div>放一 <span style="color:var(--accent-sell)" id="ask1">470.36</span></div>
        <div>已搓成 <span id="doneCount">26</span></div>
        <div>未搓成 <span id="undoneCount">124</span></div>
      </div>
    </div>
  </div>

  <div class="bottom-grid">
    <div class="hour-strip">
      <h3>24小时时序薯盘</h3>
      <div class="hours-grid" id="hoursGrid"></div>
    </div>

    <div class="ops-panel">
      <h3>当前时段操作台</h3>
      <div style="margin-bottom:0.8rem;">
        <span style="font-size:0.7rem;color:var(--text-secondary)">聚焦时段 </span>
        <span style="font-family:monospace;font-size:0.9rem;color:var(--text-primary)" id="focusHour">10:00</span>
      </div>
      <div class="ops-row">
        <button class="ops-btn buy-btn" onclick="placeOrder('buy')">搓收牌</button>
        <button class="ops-btn sell-btn" onclick="placeOrder('sell')">搓放牌</button>
      </div>
      <div class="ops-stats">
        <div>存薯量 <span id="opsInventory">-12 袋</span></div>
        <div>已搓成 <span id="opsDone">26</span> | 未成 <span id="opsUndone">124</span></div>
        <div>盯梢器 <span style="color:var(--accent-buy)" id="opsWatch">ON · 监测中</span></div>
      </div>
    </div>
  </div>
</div>

<div class="back-link">
  <a href="../">← 回到数字海洋</a>
</div>

<script>
(function() {
  var hours = [];
  for (var i = 0; i < 24; i++) {
    var basePrice = 400 + Math.sin(i / 24 * Math.PI * 2) * 80 + Math.random() * 60;
    hours.push({
      label: i + ':00',
      price: +(basePrice.toFixed(2)),
      volume: Math.floor(Math.random() * 200 + 10),
      hot: Math.random() > 0.7,
      cold: Math.random() < 0.15,
      active: i >= 8 && i <= 18
    });
  }

  var focusHour = 10;
  var doneCount = 26;
  var undoneCount = 124;
  var inventory = -12;

  function renderHoursGrid() {
    var grid = document.getElementById('hoursGrid');
    grid.innerHTML = '';
    hours.forEach(function(h, idx) {
      var cell = document.createElement('div');
      cell.className = 'hour-cell' + (idx === focusHour ? ' active' : '');
      cell.innerHTML = '<div class="h-label">' + h.label + '</div>' +
        '<div class="h-indicator ' + (h.hot ? 'hot' : (h.cold ? 'cold' : 'warm')) + '"></div>';
      cell.title = '价格: ' + h.price + ' | 成交: ' + h.volume;
      cell.onclick = function() { selectHour(idx); };
      grid.appendChild(cell);
    });
  }

  function selectHour(idx) {
    focusHour = idx;
    document.getElementById('focusHour').textContent = hours[idx].label;
    doneCount = Math.floor(Math.random() * 50 + 5);
    undoneCount = Math.floor(Math.random() * 150 + 20);
    inventory = Math.floor(Math.random() * 40 - 20);
    updateStats(hours[idx]);
    renderHoursGrid();
    drawChart();
  }

  function updateStats(h) {
    document.getElementById('lastPrice').textContent = h.price;
    document.getElementById('bid1').textContent = (h.price - 3.73).toFixed(2);
    document.getElementById('ask1').textContent = (h.price + 1.87).toFixed(2);
    document.getElementById('doneCount').textContent = doneCount;
    document.getElementById('undoneCount').textContent = undoneCount;
    document.getElementById('opsInventory').textContent = inventory + ' 袋';
    document.getElementById('opsDone').textContent = doneCount;
    document.getElementById('opsUndone').textContent = undoneCount;
    document.getElementById('opsWatch').innerHTML = Math.random() > 0.3 ?
      '<span style="color:var(--accent-buy)">ON · 监测中</span>' :
      '<span style="color:var(--accent-sell)">OFF · 暂停</span>';

    var spread = 3.73;
    document.getElementById('obSpread').textContent = '价差 ' + spread.toFixed(2);
    renderOrderBook(h.price, spread);
  }

  function renderOrderBook(midPrice, spread) {
    var html = '';
    var levels = [0.02, 0.035, 0.05, 0.075, 0.12, 0.18];

    for (var i = levels.length - 1; i >= 0; i--) {
      var askPrice = midPrice + midPrice * levels[i];
      var askVol = Math.floor(Math.random() * 500 + 50);
      var barW = Math.min(askVol / 5, 80);
      html += '<div class="ob-row">' +
        '<div class="ob-vol sell"><div class="bar" style="width:' + barW + '%"></div>' + askVol + '</div>' +
        '<div class="ob-price sell">' + askPrice.toFixed(2) + '</div>' +
        '<div></div></div>';
    }

    html += '<div class="ob-row" style="padding:0.3rem 0;"></div>';

    for (var j = 0; j < levels.length; j++) {
      var bidPrice = midPrice - midPrice * levels[j];
      var bidVol = Math.floor(Math.random() * 500 + 50);
      var barW2 = Math.min(bidVol / 5, 80);
      html += '<div class="ob-row">' +
        '<div></div>' +
        '<div class="ob-price buy">' + bidPrice.toFixed(2) + '</div>' +
        '<div class="ob-vol buy"><div class="bar" style="width:' + barW2 + '%"></div>' + bidVol + '</div></div>';
    }

    document.getElementById('orderBook').innerHTML = html;
  }

  function drawChart() {
    var canvas = document.getElementById('priceChart');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var dpr = window.devicePixelRatio || 1;
    var rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = 280 * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = '280px';
    ctx.scale(dpr, dpr);

    var w = rect.width;
    var h = 280;
    var pad = { top: 20, right: 20, bottom: 30, left: 55 };
    var pw = w - pad.left - pad.right;
    var ph = h - pad.top - pad.bottom;

    var prices = hours.map(function(h) { return h.price; });
    var minP = Math.min.apply(null, prices) - 30;
    var maxP = Math.max.apply(null, prices) + 30;

    function x(i) { return pad.left + (i / 23) * pw; }
    function y(p) { return pad.top + ph - ((p - minP) / (maxP - minP)) * ph; }

    ctx.clearRect(0, 0, w, h);

    ctx.strokeStyle = 'rgba(74,143,204,0.06)';
    ctx.lineWidth = 1;
    for (var i = 0; i < 5; i++) {
      var gy = pad.top + (ph / 4) * i;
      ctx.beginPath();
      ctx.moveTo(pad.left, gy);
      ctx.lineTo(w - pad.right, gy);
      ctx.stroke();
    }

    ctx.strokeStyle = 'rgba(74,143,204,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x(focusHour), pad.top);
    ctx.lineTo(x(focusHour), h - pad.bottom);
    ctx.stroke();

    var grad = ctx.createLinearGradient(0, pad.top, 0, h - pad.bottom);
    grad.addColorStop(0, 'rgba(74,143,204,0.15)');
    grad.addColorStop(1, 'rgba(74,143,204,0.01)');

    ctx.strokeStyle = 'rgba(74,143,204,0.6)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (var j = 0; j < hours.length; j++) {
      var px = x(j), py = y(hours[j].price);
      if (j === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(x(0), h - pad.bottom);
    for (var k = 0; k < hours.length; k++) {
      ctx.lineTo(x(k), y(hours[k].price));
    }
    ctx.lineTo(x(23), h - pad.bottom);
    ctx.closePath();
    ctx.fill();

    for (var m = 0; m < hours.length; m++) {
      var hot = hours[m].hot;
      var px2 = x(m), py2 = y(hours[m].price);
      ctx.beginPath();
      ctx.arc(px2, py2, hot ? 4 : 3, 0, Math.PI * 2);
      ctx.fillStyle = hot ? 'rgba(184,74,108,0.8)' : 'rgba(74,143,204,0.6)';
      ctx.fill();
    }

    ctx.fillStyle = 'rgba(184,74,108,0.9)';
    ctx.beginPath();
    ctx.arc(x(focusHour), y(hours[focusHour].price), 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(184,74,108,0.4)';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = '#6a88a8';
    ctx.font = '10px "SF Mono", "Consolas", monospace';
    ctx.textAlign = 'right';
    for (var n = 0; n < 5; n++) {
      var val = minP + ((maxP - minP) / 4) * n;
      ctx.fillText(val.toFixed(0), pad.left - 8, y(val) + 3);
    }

    ctx.textAlign = 'center';
    for (var p = 0; p < 24; p += 4) {
      ctx.fillText(p + ':00', x(p), h - pad.bottom + 15);
    }
  }

  window.placeOrder = function(type) {
    var h = hours[focusHour];
    var price = type === 'buy' ? (h.price - 3.73).toFixed(2) : (h.price + 1.87).toFixed(2);
    alert((type === 'buy' ? '搓收牌' : '搓放牌') + ' @ ' + price + '\n\n此为演示界面，不执行真实交易。');
  };

  window.addEventListener('resize', drawChart);

  renderHoursGrid();
  updateStats(hours[focusHour]);
  drawChart();
})();
</script>

<script src="../assets/js/shared.js"></script>
</body>
</html>
