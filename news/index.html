<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News · AI 新闻</title>
<meta name="description" content="每24小时自动更新的AI行业日报 — 纸质速报">
<link rel="stylesheet" href="../assets/css/shared.css">
<style>
  #ocean-canvas { display: none !important; }

  :root {
    --paper-base: #f5efe0;
    --paper-light: #faf6ed;
    --paper-dark: #e8ddc8;
    --ink: #2c241c;
    --ink-soft: #5a4d3e;
    --ink-faint: #8a7d6a;
    --ink-muted: #b8aa94;
    --accent-blue: #2563eb;
    --accent-blue-bg: rgba(37, 99, 235, 0.07);
    --accent-blue-dim: #6b8fc9;
    --accent-green: #2d7d6f;
    --accent-gold: #b8860b;
    --accent-rose: #c0392b;
    --accent-purple: #6b46c1;
    --border-line: #d4c8b0;
    --border-subtle: #e0d6c4;
    --shadow-warm: rgba(44, 36, 28, 0.06);
  }

  body {
    background: var(--paper-base);
    color: var(--ink);
    font-family: "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(80, 60, 40, 0.01) 1px, rgba(80, 60, 40, 0.01) 2px),
      repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(80, 60, 40, 0.007) 3px, rgba(80, 60, 40, 0.007) 5px),
      radial-gradient(ellipse at 20% 20%, rgba(200, 180, 140, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(180, 160, 120, 0.04) 0%, transparent 50%);
  }

  ::selection { background: var(--accent-blue); color: var(--paper-light); }

  a { color: var(--accent-blue); border-bottom: 1px solid transparent; transition: all 0.3s; }
  a:hover { color: var(--ink); border-bottom-color: var(--ink-muted); }

  .news-header {
    position: relative;
    z-index: 1;
    padding: 4rem 2rem 2rem;
    text-align: center;
    border-bottom: 1px solid var(--border-subtle);
  }

  .news-header h1 {
    font-size: 3.2rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    margin-bottom: 1rem;
    color: var(--ink);
    font-family: "Georgia", "Times New Roman", "Noto Serif SC", serif;
  }

  .news-header h1 .h1-sub {
    font-size: 1.6rem;
    color: var(--ink-faint);
    font-style: italic;
  }

  .header-tagline {
    font-size: 0.85rem;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
    margin-bottom: 1.5rem;
  }

  .header-stats {
    display: flex;
    justify-content: center;
    gap: 2.5rem;
    flex-wrap: wrap;
  }

  .stat-item { text-align: center; }
  .stat-item .stat-num {
    display: block;
    font-size: 1.6rem;
    font-weight: 300;
    color: var(--ink);
    font-family: "Georgia", "Times New Roman", serif;
  }
  .stat-item .stat-label {
    font-size: 0.65rem;
    color: var(--ink-faint);
    letter-spacing: 0.06em;
    margin-top: 0.2rem;
  }

  .news-feed {
    position: relative;
    z-index: 1;
    max-width: 660px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  .issue-card {
    background: var(--paper-light);
    border: 1px solid var(--border-line);
    padding: 1.2rem 1.5rem;
    margin-bottom: 0.8rem;
    cursor: pointer;
    transition: all 0.25s ease;
    border-left: 3px solid var(--accent-blue);
  }

  .issue-card:hover {
    border-color: var(--accent-blue-dim);
    box-shadow: 0 2px 8px var(--shadow-warm);
    transform: translateX(2px);
  }

  .issue-card .issue-head {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 0.4rem;
    flex-wrap: wrap;
  }

  .issue-card .issue-num {
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 0.8rem;
    color: var(--accent-blue);
    font-weight: 500;
  }

  .issue-card .issue-date {
    font-size: 0.7rem;
    color: var(--ink-faint);
    font-family: monospace;
  }

  .issue-card .issue-categories {
    display: flex;
    gap: 0.3rem;
    margin-bottom: 0.4rem;
    flex-wrap: wrap;
  }

  .issue-card .cat-tag {
    font-size: 0.55rem;
    padding: 0.1rem 0.4rem;
    letter-spacing: 0.04em;
  }

  .issue-card .issue-summary {
    font-size: 0.88rem;
    color: var(--ink-soft);
    line-height: 1.65;
    margin-bottom: 0.6rem;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .issue-card .issue-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .issue-card .company-tags {
    display: flex;
    gap: 0.35rem;
    flex-wrap: wrap;
  }

  .issue-card .company-tag {
    font-size: 0.58rem;
    padding: 0.12rem 0.45rem;
    border: 1px solid var(--border-subtle);
    color: var(--ink-faint);
    font-family: monospace;
  }

  .issue-card .item-count {
    font-size: 0.7rem;
    color: var(--ink-muted);
    font-family: monospace;
    white-space: nowrap;
  }

  .issue-card .item-count span { color: var(--accent-blue); }

  /* === Reading Modal === */
  .reading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(30, 24, 18, 0.5);
    justify-content: center;
    align-items: center;
    padding: 1rem;
  }

  .reading-overlay.open { display: flex; }

  .reading-paper {
    background: var(--paper-light);
    width: 100%;
    max-width: 460px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 4px 20px rgba(44, 36, 28, 0.15), 0 1px 3px rgba(44, 36, 28, 0.08);
    background-image: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(80, 60, 40, 0.008) 1px, rgba(80, 60, 40, 0.008) 2px);
  }

  .reading-paper::-webkit-scrollbar { width: 3px; }
  .reading-paper::-webkit-scrollbar-track { background: var(--border-subtle); }
  .reading-paper::-webkit-scrollbar-thumb { background: var(--ink-faint); border-radius: 2px; }

  .reading-header {
    position: sticky;
    top: 0;
    z-index: 2;
    background: var(--paper-light);
    border-bottom: 1px solid var(--border-subtle);
    padding: 1rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .reading-header .reading-meta {
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 0.8rem;
    color: var(--ink-soft);
  }

  .reading-header .reading-meta .reading-date {
    font-size: 0.7rem;
    color: var(--ink-faint);
    font-family: monospace;
    margin-left: 0.5rem;
  }

  .reading-close {
    background: transparent;
    border: 1px solid var(--border-line);
    color: var(--ink-faint);
    font-size: 0.85rem;
    width: 32px;
    height: 32px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-family: inherit;
  }

  .reading-close:hover { border-color: var(--ink); color: var(--ink); }

  .reading-content { padding: 1.5rem; }

  /* AI Summary */
  .ai-summary {
    background: var(--accent-blue-bg);
    border-left: 3px solid var(--accent-blue);
    padding: 1rem 1.2rem;
    margin-bottom: 1.8rem;
    font-size: 0.88rem;
    line-height: 1.9;
    color: var(--ink-soft);
  }

  .ai-summary .summary-label {
    font-size: 0.6rem;
    color: var(--accent-blue);
    font-family: monospace;
    letter-spacing: 0.08em;
    margin-bottom: 0.3rem;
    font-style: normal;
  }

  .ai-summary strong { color: var(--accent-blue); font-weight: 600; }

  /* News Items */
  .reading-content .news-item {
    margin-bottom: 1.8rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border-subtle);
  }

  .reading-content .news-item:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }

  .news-item .item-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
    flex-wrap: wrap;
  }

  .item-meta .company-badge {
    font-size: 0.6rem;
    color: var(--ink-faint);
    font-family: monospace;
    letter-spacing: 0.04em;
    border: 1px solid var(--border-subtle);
    padding: 0.08rem 0.4rem;
  }

  .item-meta .cat-badge {
    font-size: 0.55rem;
    padding: 0.08rem 0.4rem;
    letter-spacing: 0.04em;
  }

  .cat-badge.cat-model { background: rgba(37, 99, 235, 0.08); color: #1d4ed8; border: 1px solid rgba(37, 99, 235, 0.15); }
  .cat-badge.cat-tool { background: rgba(45, 125, 111, 0.08); color: #1f6b5e; border: 1px solid rgba(45, 125, 111, 0.15); }
  .cat-badge.cat-tutorial { background: rgba(184, 134, 11, 0.08); color: #8b6914; border: 1px solid rgba(184, 134, 11, 0.15); }
  .cat-badge.cat-industry { background: rgba(192, 57, 43, 0.08); color: #b03a2e; border: 1px solid rgba(192, 57, 43, 0.15); }
  .cat-badge.cat-open-source { background: rgba(107, 70, 193, 0.08); color: #5b3e9e; border: 1px solid rgba(107, 70, 193, 0.15); }

  .cat-tag.cat-model { color: #1d4ed8; border: 1px solid rgba(37, 99, 235, 0.15); }
  .cat-tag.cat-tool { color: #1f6b5e; border: 1px solid rgba(45, 125, 111, 0.15); }
  .cat-tag.cat-tutorial { color: #8b6914; border: 1px solid rgba(184, 134, 11, 0.15); }
  .cat-tag.cat-industry { color: #b03a2e; border: 1px solid rgba(192, 57, 43, 0.15); }
  .cat-tag.cat-open-source { color: #5b3e9e; border: 1px solid rgba(107, 70, 193, 0.15); }

  .news-item .item-title {
    font-size: 0.95rem;
    color: var(--ink);
    font-weight: 500;
    margin-bottom: 0.5rem;
    line-height: 1.5;
  }

  .news-item .item-body {
    font-size: 0.85rem;
    color: var(--ink-soft);
    line-height: 1.85;
  }

  .news-item .item-body strong { color: var(--accent-blue); font-weight: 600; }

  .item-links {
    display: flex;
    gap: 0.35rem;
    flex-wrap: wrap;
    margin-top: 0.6rem;
  }

  .item-links a {
    display: inline-flex;
    align-items: center;
    gap: 0.2rem;
    font-size: 0.6rem;
    padding: 0.15rem 0.5rem;
    border: 1px solid var(--border-subtle);
    color: var(--accent-blue);
    text-decoration: none;
    font-family: monospace;
    transition: all 0.2s;
  }

  .item-links a:hover {
    background: var(--accent-blue);
    color: var(--paper-light);
    border-color: var(--accent-blue);
  }

  .item-links a .link-symbol {
    font-size: 0.7rem;
  }

  .feed-end {
    text-align: center;
    padding: 2rem 0;
    font-size: 0.75rem;
    color: var(--ink-muted);
    font-family: "Georgia", "Times New Roman", serif;
    font-style: italic;
  }

  .back-link {
    text-align: center;
    padding: 2rem;
    position: relative;
    z-index: 1;
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 0.75rem;
    font-style: italic;
  }

  .back-link a { color: var(--ink-faint); letter-spacing: 0.1em; border-bottom: none; }
  .back-link a:hover { color: var(--accent-blue); }

  .search-bar {
    position: relative;
    z-index: 1;
    max-width: 660px;
    margin: 0 auto;
    padding: 0 1.5rem;
  }

  .search-bar input {
    width: 100%;
    padding: 0.65rem 1rem 0.65rem 2.5rem;
    border: 1px solid var(--border-line);
    background: var(--paper-light);
    color: var(--ink);
    font-size: 0.82rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.25s;
    box-sizing: border-box;
  }

  .search-bar input:focus {
    border-color: var(--accent-blue);
  }

  .search-bar input::placeholder {
    color: var(--ink-muted);
    font-style: italic;
  }

  .search-bar .search-icon {
    position: absolute;
    left: 2rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-muted);
    font-size: 0.85rem;
    pointer-events: none;
  }

  .search-bar .search-clear {
    display: none;
    position: absolute;
    right: 2rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--ink-muted);
    font-size: 1rem;
    cursor: pointer;
    padding: 0.2rem;
    line-height: 1;
  }

  .search-bar .search-clear:hover {
    color: var(--ink);
  }

  .search-hit {
    text-align: center;
    padding: 0.5rem 0 0;
    font-size: 0.72rem;
    color: var(--ink-faint);
    font-style: italic;
    max-width: 660px;
    margin: 0 auto;
  }

  .feed-loading {
    text-align: center;
    padding: 1.5rem 0;
    font-size: 0.72rem;
    color: var(--ink-muted);
    font-family: "Georgia", "Times New Roman", serif;
    font-style: italic;
    cursor: pointer;
    transition: color 0.2s;
  }

  .feed-loading:hover {
    color: var(--accent-blue);
  }

  @media (max-width: 600px) {
    .news-header { padding: 3rem 1.5rem 1.5rem; }
    .news-header h1 { font-size: 2.4rem; }
    .news-header h1 .h1-sub { font-size: 1.2rem; display: block; margin-top: 0.2rem; }
    .header-stats { gap: 1.5rem; }
    .news-feed { padding: 1.5rem 1rem 3rem; }
    .issue-card { padding: 1rem 1.2rem; }
    .reading-overlay { padding: 0; align-items: flex-end; }
    .reading-paper { max-width: 100%; max-height: 92vh; border-radius: 8px 8px 0 0; }
    .reading-content { padding: 1.2rem; }
  }

  @media (max-width: 400px) {
    .issue-card .issue-head { flex-direction: column; gap: 0.3rem; }
    .issue-card .issue-footer { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<div class="news-header">
  <h1>News <span class="h1-sub">/ AI 新闻</span></h1>
  <p class="header-tagline">每 24 小时自动更新的 AI 行业日报 · 纸质速报</p>
  <div class="header-stats">
    <div class="stat-item">
      <span class="stat-num" id="totalIssues">—</span>
      <span class="stat-label">已更新期数</span>
    </div>
    <div class="stat-item">
      <span class="stat-num">5</span>
      <span class="stat-label">内容分类</span>
    </div>
  </div>
</div>

<div class="search-bar">
  <span class="search-icon">⌕</span>
  <input type="text" id="searchInput" placeholder="搜索资讯内容、公司、分类..." autocomplete="off">
  <button class="search-clear" id="searchClear">✕</button>
</div>
<div class="search-hit" id="searchHit"></div>

<div class="news-feed" id="newsFeed"></div>

<div class="reading-overlay" id="readingOverlay" onclick="if(event.target===this)closeReading()">
  <div class="reading-paper" id="readingPaper">
    <div class="reading-header">
      <div class="reading-meta" id="readingMeta"></div>
      <button class="reading-close" onclick="closeReading()">✕</button>
    </div>
    <div class="reading-content" id="readingContent"></div>
  </div>
</div>

<div class="back-link">
  <a href="../">← 回到数字海洋</a>
</div>

<!-- 动态加载自动生成的新闻数据 -->
<script src="news-data.js"></script>

<script>
(function() {
  var catLabels = {
    model: '模型动态',
    tool: '产品工具',
    tutorial: '技巧教程',
    industry: '行业观察',
    'open-source': '开源项目'
  };

  var catKeys = { '模型动态': 'model', '产品工具': 'tool', '技巧教程': 'tutorial', '行业观察': 'industry', '开源项目': 'open-source' };

  var newsData = window.newsData || [];

  if (!newsData.length) {
    document.getElementById('totalIssues').textContent = '—';
    document.getElementById('newsFeed').innerHTML = '<div style="text-align:center;padding:3rem 0;color:var(--ink-faint);font-style:italic;">暂无数据，请先运行更新脚本</div>';
    return;
  }

  document.getElementById('totalIssues').textContent = newsData.length;
  var feed = document.getElementById('newsFeed');
  var searchInput = document.getElementById('searchInput');
  var searchClear = document.getElementById('searchClear');
  var searchHit = document.getElementById('searchHit');

  var DISPLAY_INITIAL = 15;
  var DISPLAY_INCREMENT = 5;
  var displayCount = DISPLAY_INITIAL;
  var currentSearch = '';
  var filteredData = newsData;
  var loadObserver = null;

  function collectAllCats(data) {
    var all = [];
    for (var i = 0; i < data.length; i++) {
      for (var j = 0; j < data[i].cats.length; j++) {
        if (all.indexOf(data[i].cats[j]) === -1) all.push(data[i].cats[j]);
      }
    }
    return all;
  }

  function catClass(name) {
    var key = catKeys[name] || '';
    return 'cat-tag cat-' + key;
  }

  function renderFeed(data, count) {
    var html = '';
    var limit = Math.min(count, data.length);
    for (var i = 0; i < limit; i++) {
      var item = data[i];
      var tagsHtml = '';
      for (var t = 0; t < item.companies.length; t++) {
        tagsHtml += '<span class="company-tag">' + esc(item.companies[t]) + '</span>';
      }
      var catsHtml = '';
      for (var c = 0; c < item.cats.length; c++) {
        catsHtml += '<span class="cat-tag ' + catClass(item.cats[c]) + '">' + esc(item.cats[c]) + '</span>';
      }
      var summaryText = item.summary.replace(/<[^>]+>/g, '');
      html += '<div class="issue-card" onclick="openReading(' + i + ')">' +
        '<div class="issue-head">' +
          '<span class="issue-num">' + item.date + ' 日报</span>' +
          '<span class="issue-date">' + (item.issueRange ? '#' + item.issueRange : '') + '</span>' +
        '</div>' +
        '<div class="issue-categories">' + catsHtml + '</div>' +
        '<div class="issue-summary">' + esc(summaryText) + '</div>' +
        '<div class="issue-footer">' +
          '<div class="company-tags">' + tagsHtml + '</div>' +
          '<span class="item-count"><span>' + item.items.length + '</span> 条资讯</span>' +
        '</div>' +
      '</div>';
    }
    if (limit < data.length) {
      html += '<div class="feed-loading" id="feedLoader">▼ 下滑加载更多</div>';
    } else {
      html += '<div class="feed-end">— 已经到底啦 —</div>';
    }
    feed.innerHTML = html;

    if (loadObserver) loadObserver.disconnect();
    var loader = document.getElementById('feedLoader');
    if (loader && limit < data.length) {
      loadObserver = new IntersectionObserver(function(entries) {
        if (entries[0].isIntersecting) {
          displayCount += DISPLAY_INCREMENT;
          renderFeed(filteredData, displayCount);
          if (loadObserver) loadObserver.disconnect();
        }
      }, { rootMargin: '100px' });
      loadObserver.observe(loader);
    }
  }

  function performSearch() {
    var keyword = searchInput.value.trim().toLowerCase();
    currentSearch = keyword;

    if (!keyword) {
      filteredData = newsData;
      searchClear.style.display = 'none';
      searchHit.textContent = '';
    } else {
      filteredData = [];
      searchClear.style.display = 'block';
      for (var i = 0; i < newsData.length; i++) {
        var issue = newsData[i];
        var matchedItems = [];
        for (var j = 0; j < issue.items.length; j++) {
          var it = issue.items[j];
          var searchText = (it.title + ' ' + it.body + ' ' + it.company + ' ' + (catLabels[it.cat] || '')).toLowerCase();
          if (searchText.indexOf(keyword) !== -1) {
            matchedItems.push(it);
          }
        }
        if (matchedItems.length > 0) {
          var copy = JSON.parse(JSON.stringify(issue));
          copy.items = matchedItems;
          filteredData.push(copy);
        }
      }
      var totalMatches = 0;
      for (var k = 0; k < filteredData.length; k++) {
        totalMatches += filteredData[k].items.length;
      }
      searchHit.textContent = '找到 ' + totalMatches + ' 条匹配资讯，分布于 ' + filteredData.length + ' 期日报';
    }

    displayCount = DISPLAY_INITIAL;
    renderFeed(filteredData, displayCount);
  }

  searchInput.addEventListener('input', function() {
    performSearch();
  });

  searchClear.addEventListener('click', function() {
    searchInput.value = '';
    performSearch();
    searchInput.focus();
  });

  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      searchInput.value = '';
      performSearch();
      searchInput.blur();
    }
  });

  window.openReading = function(idx) {
    var issue = filteredData[idx];
    var metaEl = document.getElementById('readingMeta');
    var contentEl = document.getElementById('readingContent');

    metaEl.innerHTML = issue.date + ' 日报 <span class="reading-date">' + (issue.issueRange ? '#' + issue.issueRange : '') + '</span>';

    var html = '<div class="ai-summary"><div class="summary-label">◆ AI 总结</div>' + issue.summary + '</div>';

    for (var i = 0; i < issue.items.length; i++) {
      var ni = issue.items[i];
      var catLabel = catLabels[ni.cat] || '';
      var companyBadge = ni.company ? '<span class="company-badge">' + esc(ni.company) + '</span>' : '';
      var catBadge = catLabel ? '<span class="cat-badge cat-' + ni.cat + '">' + esc(catLabel) + '</span>' : '';

      var linksHtml = '';
      for (var l = 0; l < ni.links.length; l++) {
        linksHtml += '<a href="' + escAttr(ni.links[l].url) + '" target="_blank" rel="noopener"><span class="link-symbol">↗</span> ' + esc(ni.links[l].text) + '</a>';
      }

      html += '<div class="news-item">' +
        '<div class="item-meta">' + companyBadge + catBadge + '</div>' +
        '<div class="item-title">' + ni.title.replace(/<b>/g, '<strong>').replace(/<\/b>/g, '</strong>') + '</div>' +
        '<div class="item-body">' + ni.body.replace(/<b>/g, '<strong>').replace(/<\/b>/g, '</strong>') + '</div>' +
        (linksHtml ? '<div class="item-links">' + linksHtml + '</div>' : '') +
      '</div>';
    }

    contentEl.innerHTML = html;
    document.getElementById('readingOverlay').classList.add('open');
    document.getElementById('readingPaper').scrollTop = 0;
  };

  window.closeReading = function() {
    document.getElementById('readingOverlay').classList.remove('open');
  };

  function esc(text) {
    var d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  function escAttr(url) {
    return url.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  renderFeed(filteredData, displayCount);

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeReading();
  });
})();
</script>

<script src="../assets/js/shared.js"></script>
</body>
